            ls -lh "app/lib/$JAR"
          done

          echo "=== Verifying JAR files ==="
          for JAR in app/lib/*.jar; do
            file "$JAR"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
