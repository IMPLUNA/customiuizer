name: Build APK

on:
  push:
    branches: [ feat-a15, main ]
  pull_request:
    branches: [ feat-a15, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download framework JARs from Release
        run: |
          BASE_URL="https://github.com/${{ github.repository }}/releases/latest/download"
          mkdir -p app/lib

          for JAR in framework.jar services.jar; do
            echo "=== Downloading $JAR ==="
            curl -fSL -o "app/lib/$JAR" "$BASE_URL/$JAR" || { echo "FAILED to download $JAR"; exit 1; }
            ls -lh "app/lib/$JAR"
          done

          echo "=== Verifying JAR files ==="
          for JAR in app/lib/*.jar; do
            file "$JAR"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK Platforms & Build Tools
        run: sdkmanager "platforms;android-34" "platforms;android-36" "build-tools;35.0.0"

      - name: Generate signing keystore
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD || 'pengeek123' }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD || 'pengeek123' }}
        run: |
          # 如果提供了 KEYSTORE_BASE64 secret，优先使用它
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from secret..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/release.keystore
          else
            echo "Generating temporary keystore for CI build..."
            keytool -genkeypair -v \
              -keystore $GITHUB_WORKSPACE/release.keystore \
              -alias pengeek \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass "$KS_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=Pengeek, OU=Dev, O=Pengeek, L=Beijing, ST=Beijing, C=CN"
          fi

      - name: Create keystore.properties
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD || 'pengeek123' }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD || 'pengeek123' }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS || 'pengeek' }}
        run: |
          # build.gradle 通过 rootProject.file("../keystore.properties") 读取，即 repo 父目录
          TARGET="$GITHUB_WORKSPACE/../keystore.properties"
          echo "storeFile=${{ github.workspace }}/release.keystore" > "$TARGET"
          echo "storePassword=$KS_PASS" >> "$TARGET"
          echo "keyAlias=$KS_ALIAS" >> "$TARGET"
          echo "keyPassword=$KEY_PASS" >> "$TARGET"
          cat "$TARGET"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace --console=plain --no-configuration-cache

      - name: Find APK
        id: find-apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pengeek-${{ github.sha }}
          path: ${{ steps.find-apk.outputs.apk_path }}
          if-no-files-found: error

  build-develop:
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
